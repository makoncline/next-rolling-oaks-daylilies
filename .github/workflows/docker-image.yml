name: Build and Verify Docker Image

on:
  pull_request:
  workflow_dispatch:
  # Re-enable when PR image publish/verify is proven and main should publish images.
  # push:
  #   branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    outputs:
      image_ref: ${{ steps.image.outputs.ref }}
    permissions:
      contents: read
      packages: write
    env:
      IMAGE_NAME: ghcr.io/makoncline/rolling-oaks-daylilies
      IMAGE_TAG: ${{ github.event.pull_request.head.sha || github.sha }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ env.IMAGE_TAG }}
          submodules: recursive

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set image reference
        id: image
        run: echo "ref=${IMAGE_NAME}:${IMAGE_TAG}" >> "$GITHUB_OUTPUT"

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.image.outputs.ref }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  verify:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: read
      packages: read
    steps:
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Pull image
        run: docker pull "${{ needs.build.outputs.image_ref }}"

      - name: Run container
        env:
          TURSO_DATABASE_URL: ${{ secrets.TURSO_DATABASE_URL }}
          TURSO_DATABASE_AUTH_TOKEN: ${{ secrets.TURSO_DATABASE_AUTH_TOKEN }}
        run: |
          docker run -d --rm \
            --name rolling-oaks-daylilies-ci \
            -p 3000:3000 \
            -e TURSO_DATABASE_URL \
            -e TURSO_DATABASE_AUTH_TOKEN \
            "${{ needs.build.outputs.image_ref }}"

      - name: Verify health endpoint
        run: |
          for attempt in {1..30}; do
            if curl -fsS http://127.0.0.1:3000/api/health; then
              exit 0
            fi
            sleep 2
          done

          docker logs rolling-oaks-daylilies-ci
          exit 1

      - name: Stop container
        if: always()
        run: docker rm -f rolling-oaks-daylilies-ci || true
