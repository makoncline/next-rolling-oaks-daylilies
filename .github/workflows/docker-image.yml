name: Docker

on:
  pull_request:
  workflow_dispatch:
  push:
    branches: [main]

jobs:
  build:
    name: Build and Push
    runs-on: ubuntu-latest
    outputs:
      image_ref: ${{ steps.image.outputs.ref }}
      image_tag: ${{ steps.image.outputs.tag }}
    permissions:
      contents: read
      packages: write
    env:
      IMAGE_NAME: ghcr.io/makoncline/rolling-oaks-daylilies
      IMAGE_TAG: ${{ github.event.pull_request.head.sha || github.sha }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ env.IMAGE_TAG }}
          submodules: recursive

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set image reference
        id: image
        run: |
          echo "ref=${IMAGE_NAME}:${IMAGE_TAG}" >> "$GITHUB_OUTPUT"
          echo "tag=${IMAGE_TAG}" >> "$GITHUB_OUTPUT"

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.image.outputs.ref }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  verify-health:
    name: Health Check
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: read
      packages: read
    steps:
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Pull image
        run: docker pull "${{ needs.build.outputs.image_ref }}"

      - name: Validate runtime secrets
        env:
          TURSO_DATABASE_URL: ${{ secrets.TURSO_DATABASE_URL }}
          TURSO_DATABASE_AUTH_TOKEN: ${{ secrets.TURSO_DATABASE_AUTH_TOKEN }}
        run: |
          if [ -z "$TURSO_DATABASE_URL" ] || [ -z "$TURSO_DATABASE_AUTH_TOKEN" ]; then
            echo "::error::TURSO_DATABASE_URL and TURSO_DATABASE_AUTH_TOKEN GitHub Actions secrets are required for image verification."
            exit 1
          fi

      - name: Run container
        env:
          TURSO_DATABASE_URL: ${{ secrets.TURSO_DATABASE_URL }}
          TURSO_DATABASE_AUTH_TOKEN: ${{ secrets.TURSO_DATABASE_AUTH_TOKEN }}
        run: |
          docker run -d --rm \
            --name rolling-oaks-daylilies-ci \
            -p 3000:3000 \
            -e TURSO_DATABASE_URL \
            -e TURSO_DATABASE_AUTH_TOKEN \
            "${{ needs.build.outputs.image_ref }}"

      - name: Verify health endpoint
        run: |
          for attempt in {1..30}; do
            if curl -fsS http://127.0.0.1:3000/api/health; then
              exit 0
            fi
            sleep 2
          done

          docker logs rolling-oaks-daylilies-ci
          exit 1

      - name: Stop container
        if: always()
        run: docker rm -f rolling-oaks-daylilies-ci || true

  playwright:
    name: End-to-End Test
    runs-on: ubuntu-latest
    needs: build
    timeout-minutes: 60
    permissions:
      contents: read
      packages: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}
          submodules: recursive

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright Browsers
        run: npx playwright install --with-deps

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Pull image
        run: docker pull "${{ needs.build.outputs.image_ref }}"

      - name: Validate runtime secrets
        env:
          TURSO_DATABASE_URL: ${{ secrets.TURSO_DATABASE_URL }}
          TURSO_DATABASE_AUTH_TOKEN: ${{ secrets.TURSO_DATABASE_AUTH_TOKEN }}
        run: |
          if [ -z "$TURSO_DATABASE_URL" ] || [ -z "$TURSO_DATABASE_AUTH_TOKEN" ]; then
            echo "::error::TURSO_DATABASE_URL and TURSO_DATABASE_AUTH_TOKEN GitHub Actions secrets are required for Playwright verification."
            exit 1
          fi

      - name: Run container
        env:
          TURSO_DATABASE_URL: ${{ secrets.TURSO_DATABASE_URL }}
          TURSO_DATABASE_AUTH_TOKEN: ${{ secrets.TURSO_DATABASE_AUTH_TOKEN }}
        run: |
          docker run -d --rm \
            --name rolling-oaks-daylilies-e2e \
            -p 3000:3000 \
            -e TURSO_DATABASE_URL \
            -e TURSO_DATABASE_AUTH_TOKEN \
            "${{ needs.build.outputs.image_ref }}"

      - name: Wait for health endpoint
        run: |
          for attempt in {1..30}; do
            if curl -fsS http://127.0.0.1:3000/api/health; then
              exit 0
            fi
            sleep 2
          done

          docker logs rolling-oaks-daylilies-e2e
          exit 1

      - name: Run Playwright tests
        run: cd packages/app && npx playwright test
        env:
          TEST_BASE_URL: http://127.0.0.1:3000

      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: packages/app/playwright-report/
          retention-days: 30

      - name: Stop container
        if: always()
        run: docker rm -f rolling-oaks-daylilies-e2e || true

  deploy:
    name: Deploy to VPS
    runs-on: ubuntu-latest
    needs: [build, verify-health, playwright]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: read
    steps:
      - name: Validate deploy inputs
        env:
          DEPLOY_WEBHOOK_TOKEN: ${{ secrets.DEPLOY_WEBHOOK_TOKEN }}
          IMAGE_TAG: ${{ needs.build.outputs.image_tag }}
          EXPECTED_IMAGE_TAG: ${{ github.sha }}
        run: |
          if [ -z "$DEPLOY_WEBHOOK_TOKEN" ]; then
            echo "::error::DEPLOY_WEBHOOK_TOKEN GitHub Actions secret is required for VPS deployment."
            exit 1
          fi
          if [ "$IMAGE_TAG" != "$EXPECTED_IMAGE_TAG" ]; then
            echo "::error::Deploy image tag must match github.sha."
            exit 1
          fi

      - name: Deploy to VPS
        env:
          DEPLOY_WEBHOOK_TOKEN: ${{ secrets.DEPLOY_WEBHOOK_TOKEN }}
          IMAGE_TAG: ${{ needs.build.outputs.image_tag }}
        run: |
          curl --fail-with-body -X POST \
            "https://deploy.makon.dev/deploy/rolling-oaks-daylilies" \
            -H "Authorization: Bearer ${DEPLOY_WEBHOOK_TOKEN}" \
            -H "Content-Type: application/json" \
            -d "{\"image_tag\":\"${IMAGE_TAG}\"}"
