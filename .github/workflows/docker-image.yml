name: Build Docker Image

on:
  pull_request:
  workflow_dispatch:
  # Re-enable when PR image builds are proven and main should publish images.
  # push:
  #   branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          tags: rolling-oaks-daylilies:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max
